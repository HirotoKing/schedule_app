<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>スケジュールアプリ</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

  <!-- 上部エリア -->
  <div class="top">
    <!-- 雲コンテナ -->
    <div id="cloudContainer"></div>

    <!-- 上部メニュー -->
    <div class="top-bar right">
      <button id="historyBtn">移動履歴</button>
      <button id="weekBtn">直近1週間</button>
    </div>

    <!-- 気球と高度表示 -->
    <img src="{{ url_for('static', filename='balloon.png') }}" class="balloon" id="balloon" alt="気球" />
    <div class="altimeter" id="altimeter" data-altitude="0">高度：0m</div>
    <div id="milestoneToast" class="milestone-toast hidden"></div>
    <div id="sparkleLayer" class="sparkle-layer" aria-hidden="true"></div>

    <!-- 週週目標を追加 -->
    <div id="weeklyGoal" class="weekly-goal"></div>  
    <div id="warning" class="warning"></div>
  </div>

  <!-- 下部エリア -->
  <div class="bottom">
    <div id="question" class="question">読み込み中...</div>
    <div class="button-grid">
      <button class="activity-btn sleep" onclick="handleButtonClick('寝食')">
        <span class="activity-icon">寝</span>
        <span class="activity-label">寝食</span>
      </button>
      <button class="activity-btn work" onclick="handleButtonClick('仕事')">
        <span class="activity-icon">仕</span>
        <span class="activity-label">仕事</span>
      </button>
      <button class="activity-btn think" onclick="handleButtonClick('知的活動')">
        <span class="activity-icon">知</span>
        <span class="activity-label">知的活動</span>
      </button>
      <button class="activity-btn study" onclick="handleButtonClick('勉強')">
        <span class="activity-icon">学</span>
        <span class="activity-label">勉強</span>
      </button>
      <button class="activity-btn exercise" onclick="handleButtonClick('運動')">
        <span class="activity-icon">動</span>
        <span class="activity-label">運動</span>
      </button>
      <button class="activity-btn game" onclick="handleButtonClick('ゲーム')">
        <span class="activity-icon">遊</span>
        <span class="activity-label">ゲーム</span>
      </button>
    </div>
    <div id="todayDate" class="today-date"></div>
  </div>

  <!-- ボーナス質問ポップアップ -->
  <div id="bonusPopup" class="popup hidden">
    <div class="popup-content bonus-content">
      <div class="bonus-heading">
        <span class="bonus-badge">朝</span>
        <div>
          <h3>スタートボーナス</h3>
          <p>昨日のコンディションを確認します。</p>
        </div>
      </div>
      <div class="bonus-options">
        <label class="bonus-option">
          <input type="checkbox" id="q1">
          <span class="bonus-option-icon">制</span>
          <span>
            <strong>スマホ時間</strong>
            <small>昨日のスマホ操作時間は6時間以下だった</small>
          </span>
        </label>
        <label class="bonus-option">
          <input type="checkbox" id="q2">
          <span class="bonus-option-icon">早</span>
          <span>
            <strong>早寝早起き</strong>
            <small>昨日は24:00より前に寝て、今日は7:00に起きた</small>
          </span>
        </label>
      </div>
      <button id="bonusSubmit" class="bonus-submit">回答してスタート</button>
    </div>
  </div>

  <!-- 昨日の未記録確認ポップアップ -->
  <div id="resumeYesterdayPopup" class="popup hidden">
    <div class="popup-content">
      <h3>昨日の未記録データがあります</h3>
      <p id="resumeYesterdayMessage"></p>
      <div class="popup-actions">
        <button id="resumeYesterdayBtn">入力する</button>
        <button id="skipYesterdayBtn" class="secondary-btn">今日から開始</button>
      </div>
    </div>
  </div>

  <!-- 移動履歴ポップアップ -->
  <div id="historyPopup" class="popup hidden">
    <div class="popup-content">
      <span id="closePopup" class="close-btn">×</span>
      <h3>今までの高度推移</h3>
      <canvas id="heightChart" width="300" height="150"></canvas>
      <h4>活動回数の合計</h4>
      <ul id="summaryList"></ul>
    </div>
  </div>
  
  <!-- 1週間サマリーポップアップ -->
  <div id="weekPopup" class="popup hidden">
    <div class="popup-content">
      <span id="closeWeek" class="close-btn">×</span>
      <h3>直近1週間のサマリー</h3>
      <table id="weekTable" border="1" style="width:100%; text-align:center;">
        <thead>
          <tr>
            <th>日付</th>
            <th>寝食</th><th>仕事</th><th>知的活動</th>
            <th>勉強</th><th>運動</th><th>ゲーム</th>
            <th>高度変化量</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>

      <!-- 円グラフを追加 -->
      <h4>活動内訳（合計時間）</h4>
      <canvas id="weekChart" width="300" height="300"></canvas>
    </div>
  </div>

  <!-- スクリプト -->
  <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
